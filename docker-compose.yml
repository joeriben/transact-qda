services:
  postgres:
    image: postgres:16
    container_name: transact-qda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: transact_qda
      POSTGRES_USER: tqda
      POSTGRES_PASSWORD: tqda_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
