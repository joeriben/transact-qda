name: tqda-work

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: transact_qda
      POSTGRES_USER: tqda
      POSTGRES_PASSWORD: tqda_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tqda -d transact_qda"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ${TQDA_IMAGE:-ghcr.io/joeriben/transact-qda:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tqda:tqda_dev@db:5432/transact_qda
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-secret-change-before-real-use-xxxxxxxxxx}
      HOST: 0.0.0.0
      PORT: 5174
    ports:
      - "${TQDA_PORT:-5174}:5174"
    volumes:
      - projekte:/app/projekte
      - uploads:/app/uploads
      - modelcache:/app/.model-cache
      - coach:/app/coach-library
      - backups:/app/backups

volumes:
  pgdata:
  projekte:
  uploads:
  modelcache:
  coach:
  backups:
